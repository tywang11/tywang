# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  compress_javascript: false
  exclude: ["robots.txt", "assets/js/search/*.js"]

# -----------------------------------------------------------------------------
# Terser
# -----------------------------------------------------------------------------
terser:
  compress:
    drop_console: true

# -----------------------------------------------------------------------------
# Jekyll Terser
# -----------------------------------------------------------------------------
jekyll-terser:
  ignore:
    - "assets/libs/**/*"


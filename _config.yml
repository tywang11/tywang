# -----------------------------------------------------------------------------
# Newsletter
# -----------------------------------------------------------------------------
newsletter:
  enabled: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  projects:
    output: true
    permalink: /:collection/:title/

# -----------------------------------------------------------------------------
# Widgets
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
timezone: Asia/Shanghai

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

include: ['_pages']
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - .github

keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-terser
  - jekyll-toc
  - jemoji

sass:
  style: compressed

jekyll-scholar:
  last_name: Wang
  first_name: [Tianyi]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]
  bibtex_skip_fields: [abstract, month, issn]

jektex:
  enabled: false

# -----------------------------------------------------------------------------
# Responsive images
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Link attributes
# -----------------------------------------------------------------------------
link_attributes:
  pdf: 'data-fancybox="gallery" data-caption=""'

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  exclude: ['robots.txt']
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Jekyll Terser
# -----------------------------------------------------------------------------
jekyll-terser:
  ignore:
    - "assets/libs/**/*"

# -----------------------------------------------------------------------------
# Font Awesome
# -----------------------------------------------------------------------------
fontawesome:
  version: "6.7.1"
  integrity: "sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="

# -----------------------------------------------------------------------------
# Newsletter
# -----------------------------------------------------------------------------
newsletter:
  enabled: false

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
blog_name: Research Blog
blog_description: Notes on adversarial ML and efficient deep learning
permalink: /blog/:year/:title/
lsi: false

pagination:
  enabled: true
  debug: false
  collection: posts
  permalink: /page/:num/
  per_page: 5
  sort_field: date
  sort_reverse: true
  category: posts
  tag: ''
  locale: ''
  trim_input: false
  trail:
    before: 1
    after: 3
  extension: html
  indexpage: index.html

related_blog_posts:
  enabled: true
  max_related: 5

giscus:
  repo: # <your-github-user-name>/<your-github-repo-name>
  category: Comments
  theme: preferred_color_scheme
  lang: en

disqus_shortname: # your Disqus shortname

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /:collection/:title/
  projects:
    output: true
    permalink: /:collection/:title/

announcements:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: false

# -----------------------------------------------------------------------------
# Widgets
# -----------------------------------------------------------------------------
visitor_maps:
  enabled: false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
timezone: Asia/Shanghai

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

include: ['_pages']
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - .github
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - INSTALL.md
  - lighthouse_results/

keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

sass:
  style: compressed

jekyll-archives:
  enabled: [year, tags, categories]
  layout: archive-taxonomy
  permalinks:
    year: '/blog/:year/'
    tag: '/blog/tag/:name/'
    category: '/blog/category/:name/'

jekyll-scholar:
  last_name: Wang
  first_name: [Tianyi]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]
  bibtex_skip_fields: [abstract, month, issn]

jektex:
  enabled: false

# -----------------------------------------------------------------------------
# Responsive images
# -----------------------------------------------------------------------------
imagemagick:
  enabled: true
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - .jpg
    - .jpeg
    - .png
    - .tiff
  output_formats:
    webp: .webp

# -----------------------------------------------------------------------------
# Link attributes
# -----------------------------------------------------------------------------
link_attributes:
  pdf: 'data-fancybox="gallery" data-caption=""'

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------
jekyll-minifier:
  exclude: ['robots.txt']
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Jekyll Terser
# -----------------------------------------------------------------------------
jekyll-terser:
  ignore:
    - "assets/libs/**/*"

# -----------------------------------------------------------------------------
# Feature flags
# -----------------------------------------------------------------------------
enable_google_analytics: false
enable_cronitor_analytics: false
enable_pirsch_analytics: false
enable_openpanel_analytics: false
google_analytics_id: # your google analytics measurement id
cookie_consent:
  enabled: false

# -----------------------------------------------------------------------------
# Font Awesome
# -----------------------------------------------------------------------------
fontawesome:
  version: "6.7.1"
  integrity: "sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
